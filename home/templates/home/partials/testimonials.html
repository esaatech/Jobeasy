<!-- Testimonials Section -->
<div class="w-full flex flex-col items-center justify-center py-12 px-4 bg-gray-50">
    <h2 class="headline-secondary text-center">What Our Users Say</h2>
    <div id="testimonial-list" class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-4xl"></div>
</div>
<script>
function renderTestimonials(testimonials) {
    const container = document.getElementById('testimonial-list');
    container.innerHTML = '';
    testimonials.forEach(t => {
        const card = document.createElement('div');
        card.className = 'testimonial-card bg-white rounded-xl shadow p-6 flex flex-col items-center text-center';
        card.innerHTML = `
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex items-center justify-center text-white text-2xl font-bold mb-4">
                ${t.name.split(' ').map(n => n[0]).join('').toUpperCase()}
            </div>
            <div class="body-text mb-2">"${t.quote}"</div>
            <div class="headline-tertiary mt-2">— ${t.name}</div>
        `;
        container.appendChild(card);
    });
}
fetch('/api/testimonials/')
    .then(res => res.json())
    .then(data => renderTestimonials(data))
    .catch(() => {
        document.getElementById('testimonial-list').innerHTML = '<div class="text-red-500">Failed to load testimonials.</div>';
    });
</script>
