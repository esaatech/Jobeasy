<!-- Testimonials Section -->
<div class="w-full flex flex-col items-center justify-center py-12 px-4 bg-gray-50">
    <h2 class="headline-primary text-center">What Our Users Say</h2>
    <div class="relative w-full max-w-4xl px-8 md:px-12 pointer-events-none">
        <button type="button" id="testimonial-left" class="absolute -left-6 top-1/2 -translate-y-1/2 z-10 bg-white rounded-full shadow p-2 flex items-center justify-center pointer-events-auto" aria-label="Previous testimonial">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div id="testimonial-carousel" class="flex overflow-x-auto no-scrollbar scroll-smooth snap-x snap-mandatory">
            <!-- Cards will be injected here -->
        </div>
        <button type="button" id="testimonial-right" class="absolute -right-6 top-1/2 -translate-y-1/2 z-10 bg-white rounded-full shadow p-2 flex items-center justify-center pointer-events-auto" aria-label="Next testimonial">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
    </div>
    <div id="testimonial-dots" class="flex justify-center mt-6 gap-2"></div>
</div>
<script>
function renderTestimonialsCarousel(testimonials) {
    const container = document.getElementById('testimonial-carousel');
    container.innerHTML = '';
    testimonials.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'testimonial-card bg-white rounded-xl shadow p-6 flex flex-col items-center text-center min-w-full md:min-w-[33.3333%] snap-center transition-transform duration-300';
        card.innerHTML = `
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex items-center justify-center text-white text-2xl font-bold mb-4">
                ${t.name.split(' ').map(n => n[0]).join('').toUpperCase()}
            </div>
            <div class="body-text mb-2">"${t.quote}"</div>
            <div class="headline-tertiary mt-2">— ${t.name}</div>
        `;
        container.appendChild(card);
    });
    // Dots
    const dots = document.getElementById('testimonial-dots');
    dots.innerHTML = '';
    testimonials.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'w-3 h-3 rounded-full bg-gray-300 focus:outline-none';
        dot.setAttribute('aria-label', `Go to testimonial ${i+1}`);
        dot.addEventListener('click', () => scrollToTestimonial(i));
        dots.appendChild(dot);
    });
    updateActiveDot(0);
}

function scrollToTestimonial(idx) {
    const container = document.getElementById('testimonial-carousel');
    const card = container.children[idx];
    if (card) card.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
    updateActiveDot(idx);
}

function updateActiveDot(idx) {
    const dots = document.querySelectorAll('#testimonial-dots button');
    dots.forEach((dot, i) => {
        dot.classList.toggle('bg-primary', i === idx);
        dot.classList.toggle('bg-gray-400', i === idx);
        dot.classList.toggle('bg-gray-300', i !== idx);
    });
}

let currentIdx = 0;
let testimonialsData = [];

function handleArrow(direction) {
    const maxIdx = testimonialsData.length - 1;
    if (direction === 'left') {
        currentIdx = Math.max(0, currentIdx - 1);
    } else {
        currentIdx = Math.min(maxIdx, currentIdx + 1);
    }
    scrollToTestimonial(currentIdx);
}

document.getElementById('testimonial-left').addEventListener('click', () => handleArrow('left'));
document.getElementById('testimonial-right').addEventListener('click', () => handleArrow('right'));

document.getElementById('testimonial-carousel').addEventListener('scroll', function() {
    const container = this;
    const cards = Array.from(container.children);
    const scrollLeft = container.scrollLeft;
    let idx = 0;
    let minDiff = Infinity;
    cards.forEach((card, i) => {
        const diff = Math.abs(card.offsetLeft - scrollLeft);
        if (diff < minDiff) {
            minDiff = diff;
            idx = i;
        }
    });
    currentIdx = idx;
    updateActiveDot(idx);
});

fetch('/api/testimonials/')
    .then(res => res.json())
    .then(data => {
        testimonialsData = data;
        renderTestimonialsCarousel(data);
    })
    .catch(() => {
        document.getElementById('testimonial-carousel').innerHTML = '<div class="text-red-500">Failed to load testimonials.</div>';
    });
</script>
<style>
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.bg-primary { background-color: #7c3aed !important; }
</style>
