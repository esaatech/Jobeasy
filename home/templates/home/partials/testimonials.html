<!-- Testimonials Section -->
<section class="section section-alt">
    <div class="page-width">
        <!-- Section Header -->
        <div class="section-header">
            <h2 class="headline-secondary text-center">What our users say</h2>
            <p class="subheadline text-center mx-auto max-w-3xl">Real stories from people who strengthened their applications and moved their job search forward.</p>
        </div>
        
        <!-- Testimonials Container -->
        <div class="testimonials-container">
            <div id="testimonial-carousel" class="testimonials-carousel">
                <!-- Cards will be injected here -->
            </div>
            
            <!-- Navigation -->
            <div class="testimonial-navigation">
                <button type="button" id="testimonial-left" class="nav-arrow nav-arrow-left" aria-label="Previous testimonial">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                
                <div id="testimonial-dots" class="testimonial-dots"></div>
                
                <button type="button" id="testimonial-right" class="nav-arrow nav-arrow-right" aria-label="Next testimonial">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</section>

<style>
/* Testimonials Section - Flat Design */
.testimonials-container {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
}

.testimonials-carousel {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    scroll-snap-type: x mandatory;
    gap: 2rem;
    padding: 1rem 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.testimonials-carousel::-webkit-scrollbar {
    display: none;
}

.testimonial-card {
    background-color: var(--bg-primary);
    border: 1px solid #E5E7EB;
    border-radius: 1rem;
    padding: 2rem;
    min-width: 320px;
    max-width: 400px;
    flex-shrink: 0;
    scroll-snap-align: center;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.testimonial-card:hover {
    border-color: var(--color-primary);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
}

.testimonial-avatar {
    width: 4rem;
    height: 4rem;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    flex-shrink: 0;
}

.testimonial-quote {
    font-size: 1.125rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    flex-grow: 1;
    font-style: italic;
}

.testimonial-author {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
}

/* Navigation */
.testimonial-navigation {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    margin-top: 2rem;
}

.nav-arrow {
    background-color: var(--bg-primary);
    border: 1px solid #E5E7EB;
    border-radius: 50%;
    width: 3rem;
    height: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
}

.nav-arrow:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);
    transform: scale(1.05);
}

.nav-arrow:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.testimonial-dots {
    display: flex;
    gap: 0.75rem;
    align-items: center;
}

.testimonial-dot {
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 50%;
    background-color: #D1D5DB;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
}

.testimonial-dot.active {
    background-color: var(--color-primary);
    transform: scale(1.2);
}

.testimonial-dot:hover:not(.active) {
    background-color: #9CA3AF;
}

/* Responsive Design */
@media (max-width: 768px) {
    .testimonials-carousel {
        gap: 1rem;
        padding: 0.5rem 0;
    }
    
    .testimonial-card {
        min-width: 280px;
        max-width: 320px;
        padding: 1.5rem;
    }
    
    .testimonial-avatar {
        width: 3rem;
        height: 3rem;
        font-size: 1.25rem;
        margin-bottom: 1rem;
    }
    
    .testimonial-quote {
        font-size: 1rem;
        margin-bottom: 1rem;
    }
    
    .testimonial-author {
        font-size: 0.875rem;
    }
    
    .testimonial-navigation {
        gap: 1.5rem;
        margin-top: 1.5rem;
    }
    
    .nav-arrow {
        width: 2.5rem;
        height: 2.5rem;
    }
}

@media (max-width: 480px) {
    .testimonial-card {
        min-width: 260px;
        max-width: 280px;
        padding: 1.25rem;
    }
    
    .testimonial-navigation {
        gap: 1rem;
    }
}
</style>

<script>
// Testimonials Carousel Functionality
function renderTestimonialsCarousel(testimonials) {
    const container = document.getElementById('testimonial-carousel');
    container.innerHTML = '';
    
    testimonials.forEach((testimonial, index) => {
        const card = document.createElement('div');
        card.className = 'testimonial-card';
        
        // Generate initials from name
        const initials = testimonial.name
            .split(' ')
            .map(n => n[0])
            .join('')
            .toUpperCase()
            .slice(0, 2);
        
        card.innerHTML = `
            <div class="testimonial-avatar">
                ${initials}
            </div>
            <div class="testimonial-quote">
                "${testimonial.quote}"
            </div>
            <div class="testimonial-author">
                — ${testimonial.name}
            </div>
        `;
        
        container.appendChild(card);
    });
    
    // Generate dots
    const dotsContainer = document.getElementById('testimonial-dots');
    dotsContainer.innerHTML = '';
    
    testimonials.forEach((_, index) => {
        const dot = document.createElement('button');
        dot.className = 'testimonial-dot';
        dot.setAttribute('aria-label', `Go to testimonial ${index + 1}`);
        dot.addEventListener('click', () => scrollToTestimonial(index));
        dotsContainer.appendChild(dot);
    });
    
    updateActiveDot(0);
    updateArrowStates();
}

function scrollToTestimonial(index) {
    const container = document.getElementById('testimonial-carousel');
    const card = container.children[index];
    
    if (card) {
        card.scrollIntoView({ 
            behavior: 'smooth', 
            inline: 'center', 
            block: 'nearest' 
        });
    }
    
    currentTestimonialIndex = index;
    updateActiveDot(index);
    updateArrowStates();
}

function updateActiveDot(activeIndex) {
    const dots = document.querySelectorAll('.testimonial-dot');
    dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === activeIndex);
    });
}

function updateArrowStates() {
    const leftArrow = document.getElementById('testimonial-left');
    const rightArrow = document.getElementById('testimonial-right');
    const totalTestimonials = testimonialsData.length;
    
    leftArrow.disabled = currentTestimonialIndex === 0;
    rightArrow.disabled = currentTestimonialIndex === totalTestimonials - 1;
}

// State management
let currentTestimonialIndex = 0;
let testimonialsData = [];

// Navigation handlers
function handlePrevious() {
    if (currentTestimonialIndex > 0) {
        scrollToTestimonial(currentTestimonialIndex - 1);
    }
}

function handleNext() {
    if (currentTestimonialIndex < testimonialsData.length - 1) {
        scrollToTestimonial(currentTestimonialIndex + 1);
    }
}

// Event listeners
document.getElementById('testimonial-left').addEventListener('click', handlePrevious);
document.getElementById('testimonial-right').addEventListener('click', handleNext);

// Scroll detection for updating active dot
document.getElementById('testimonial-carousel').addEventListener('scroll', function() {
    const container = this;
    const cards = Array.from(container.children);
    const containerCenter = container.scrollLeft + container.clientWidth / 2;
    
    let closestIndex = 0;
    let closestDistance = Infinity;
    
    cards.forEach((card, index) => {
        const cardCenter = card.offsetLeft + card.clientWidth / 2;
        const distance = Math.abs(containerCenter - cardCenter);
        
        if (distance < closestDistance) {
            closestDistance = distance;
            closestIndex = index;
        }
    });
    
    if (closestIndex !== currentTestimonialIndex) {
        currentTestimonialIndex = closestIndex;
        updateActiveDot(closestIndex);
        updateArrowStates();
    }
});

// Fetch testimonials data
fetch('/api/testimonials/')
    .then(response => response.json())
    .then(data => {
        testimonialsData = data;
        renderTestimonialsCarousel(data);
    })
    .catch(error => {
        console.error('Failed to load testimonials:', error);
        document.getElementById('testimonial-carousel').innerHTML = 
            '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">Unable to load testimonials at this time.</div>';
    });

// Keyboard navigation
document.addEventListener('keydown', function(event) {
    if (event.key === 'ArrowLeft') {
        handlePrevious();
    } else if (event.key === 'ArrowRight') {
        handleNext();
    }
});
</script>
