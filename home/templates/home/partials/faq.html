<!-- FAQ Section -->
<style>
.faq-accordion {
    width: 100%;
    max-width: 64rem; /* 1024px, matches max-w-4xl */
    margin: 0 auto;
    background: #f8fafc;
    border-radius: 1.25rem;
    box-shadow: 0 4px 24px rgba(99,102,241,0.07);
    padding: 2.5rem 1.5rem;
}
.faq-item {
    border-bottom: 1px solid #e5e7eb;
    padding: 1.25rem 0;
}
.faq-question {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: #3730a3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: color 0.2s;
}
.faq-question:hover {
    color: #06b6d4;
}
.faq-icon {
    transition: transform 0.3s;
    margin-left: 1rem;
}
.faq-answer {
    color: #334155;
    font-size: 1rem;
    margin-top: 1rem;
    line-height: 1.6;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    opacity: 0;
}
.faq-item.open .faq-answer {
    max-height: 200px;
    opacity: 1;
}
.faq-item.open .faq-icon {
    transform: rotate(45deg);
}
</style>
<div class="w-full flex flex-col items-center justify-center py-16 px-4 bg-gradient-to-b from-white to-blue-50">
    <h2 class="text-3xl md:text-4xl font-bold mb-10" style="font-family: 'Inter', sans-serif; color: #111827;">Frequently Asked Questions</h2>
    <div class="faq-accordion" id="faq-accordion">
        <!-- FAQ items will be injected here by JS -->
    </div>
</div>
<script>
function renderFAQs(faqs) {
    const container = document.getElementById('faq-accordion');
    container.innerHTML = '';
    faqs.forEach(faq => {
        const item = document.createElement('div');
        item.className = 'faq-item';
        item.innerHTML = `
            <button class="faq-question" type="button">
                ${faq.question}
                <span class="faq-icon">&#43;</span>
            </button>
            <div class="faq-answer">${faq.answer}</div>
        `;
        container.appendChild(item);
    });
    // Add accordion behavior
    container.querySelectorAll('.faq-question').forEach(btn => {
        btn.addEventListener('click', function() {
            const item = this.closest('.faq-item');
            item.classList.toggle('open');
            container.querySelectorAll('.faq-item').forEach(other => {
                if (other !== item) other.classList.remove('open');
            });
        });
    });
}

// Fetch FAQs from backend API (default to English)
fetch('/api/faqs/?language=en')
    .then(res => res.json())
    .then(data => renderFAQs(data))
    .catch(() => {
        document.getElementById('faq-accordion').innerHTML = '<div class="text-red-500">Failed to load FAQs.</div>';
    });
</script>
