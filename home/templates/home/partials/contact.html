<!-- Contact Section -->
<div class="w-full flex flex-col items-center justify-center py-16 px-4 bg-white">
    <h2 class="headline-primary text-center mb-8" data-i18n="contact_us">Contact Us</h2>
    <div class="w-full">
        <div class="bg-gray-50 rounded-xl shadow p-8 flex flex-col md:flex-row gap-8">
            <!-- Contact Form -->
            <div class="flex-1">
                <form id="contact-form" method="post" action="#">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2" for="name" data-i18n="contact_form_name">Name</label>
                        <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" type="text" id="name" name="name" required data-i18n-placeholder="contact_form_name">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2" for="email" data-i18n="contact_form_email">Email</label>
                        <input class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" type="email" id="email" name="email" required data-i18n-placeholder="contact_form_email">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 font-semibold mb-2" for="message" data-i18n="contact_form_message">Message</label>
                        <textarea class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" id="message" name="message" rows="4" required data-i18n-placeholder="contact_form_message"></textarea>
                    </div>
                    <button type="submit" class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-semibold px-6 py-2 rounded-lg shadow hover:from-cyan-500 hover:to-blue-500 transition" data-i18n="contact_form_send">Send Message</button>
                    <div id="contact-status" class="mt-4 text-sm"></div>
                </form>
                <div class="text-gray-500 text-sm mt-6 text-center md:text-left">
                    <span data-i18n="contact_email_text">Or email us at</span> <a href="mailto:support@jobeas.com" class="text-blue-500 underline">support@jobeas.com</a>
                </div>
            </div>
            <!-- Newsletter Signup -->
            <div class="flex-1 flex flex-col justify-center items-center md:items-start bg-white rounded-lg p-6 shadow-sm">
                <h3 class="headline-tertiary mb-2" data-i18n="newsletter_title">Register for Newsletter</h3>
                <p class="body-text-small mb-4" data-i18n="newsletter_sub">Get the latest job search tips, product updates, and exclusive offers straight to your inbox.</p>
                <form id="newsletter-form" method="post" action="#" class="w-full flex flex-col sm:flex-row gap-3">
                    {% csrf_token %}
                    <input type="email" name="newsletter_email" id="newsletter_email" placeholder="Your email address" required class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" data-i18n-placeholder="newsletter_placeholder">
                    <button type="submit" class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-semibold px-6 py-2 rounded-lg shadow hover:from-cyan-500 hover:to-blue-500 transition" data-i18n="newsletter_subscribe">Subscribe</button>
                    <div id="newsletter-status" class="mt-3 text-sm w-full"></div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const statusDiv = document.getElementById('contact-status');
    statusDiv.textContent = '';
    const form = e.target;
    const data = {
        name: form.name.value,
        email: form.email.value,
        message: form.message.value
    };
    fetch('/api/contact/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': csrftoken,
        },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) throw new Error('Failed to send message.');
        return res.json();
    })
    .then(() => {
        statusDiv.textContent = i18next.t('contact_form_success');
        statusDiv.className = 'mt-4 text-green-600 text-sm';
        form.reset();
    })
    .catch(() => {
        statusDiv.textContent = i18next.t('contact_form_error');
        statusDiv.className = 'mt-4 text-red-600 text-sm';
    });
});

document.getElementById('newsletter-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const statusDiv = document.getElementById('newsletter-status');
    statusDiv.textContent = '';
    const email = document.getElementById('newsletter_email').value;
    fetch('/api/newsletter/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': csrftoken,
        },
        body: JSON.stringify({ email })
    })
    .then(res => {
        if (!res.ok) throw new Error('Failed to subscribe.');
        return res.json();
    })
    .then(() => {
        statusDiv.textContent = i18next.t('newsletter_success');
        statusDiv.className = 'mt-3 text-green-600 text-sm w-full';
        document.getElementById('newsletter-form').reset();
    })
    .catch(() => {
        statusDiv.textContent = i18next.t('newsletter_error');
        statusDiv.className = 'mt-3 text-red-600 text-sm w-full';
    });
});
</script>
