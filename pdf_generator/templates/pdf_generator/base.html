<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF Document{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_css %}{% endblock %}
    <style>
        /* PDF-specific styles */
        @media print {
            body {
                margin: 0;
                padding: 0;
                font-size: 12pt;
                line-height: 1.4;
            }
            
            .no-print {
                display: none !important;
            }
            
            * {
                color: black !important;
                background: white !important;
            }
        }
        
        /* General styles for better PDF rendering */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            margin-bottom: 0.5em;
            font-weight: 600;
        }
        
        p {
            margin-bottom: 0.5em;
        }
        
        ul, ol {
            margin-bottom: 0.5em;
            padding-left: 1.5em;
        }
        
        li {
            margin-bottom: 0.25em;
        }
        
        /* Ensure proper spacing for PDF */
        .pdf-section {
            margin-bottom: 1em;
        }
        
        .pdf-section:last-child {
            margin-bottom: 0;
        }
        
        /* Page break utilities */
        .page-break {
            page-break-before: always;
        }
        
        .page-break-after {
            page-break-after: always;
        }
        
        .avoid-break {
            page-break-inside: avoid;
        }
    </style>
    {% block pdf_styles %}{% endblock %}
</head>
<body class="bg-white">
    {% block pdf_content %}
        <!-- Default content -->
        <div class="container mx-auto px-4 py-8">
            <h1>PDF Document</h1>
            <p>This is a default PDF template. Override the pdf_content block to add your content.</p>
        </div>
    {% endblock %}
</body>
</html>
