<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ cover_letter.title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        h1, h2, h3 {
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 0.5em;
        }
        .cover-letter-content {
            white-space: pre-wrap; /* Use pre-wrap to respect newlines and wrap text */
            font-size: 11pt;
        }
    </style>
</head>
<body>
    <div class="cover-letter-content">
        {% with lines=cover_letter.content.splitlines %}
            {% if lines|length > 1 %}
                <span style="text-align: left; display: block; margin-bottom: 0;">{{ lines.0 }}</span>
                <span style="text-align: justify; display: block; margin-top: 0;">
                    {{ lines|slice:"1:"|join:"<br>"|safe }}
                </span>
            {% else %}
                <span style="text-align: left; display: block;">{{ cover_letter.content }}</span>
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
