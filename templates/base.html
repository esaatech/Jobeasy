{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Cover Letter Generator{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Flatpickr Date Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <!-- Alert System CSS -->
    <link rel="stylesheet" href="{% static 'utils/css/alerts.css' %}">
    
    <!-- Base CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    
    <!-- Custom CSS -->
    {% block extra_css %}{% endblock %}
    
    {% block extra_head %}{% endblock %}
    
    <!-- Base CSS -->
    <style>
        .prose {
            max-width: 65ch;
            color: #374151;
        }
        .prose p {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    {% include 'navigation.html' %}
    
    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    {% include 'home/partials/footer.html' %}

    <!-- Base JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Alert System JavaScript -->
  <script src="{% static 'utils/components/dialog.js' %}"></script>
<script src="{% static 'utils/components/alert.js' %}"></script>
<!-- Now your app scripts -->

    <!-- Extra JavaScript -->
    {% block extra_scripts %}{% endblock %}
</body>
</html>
