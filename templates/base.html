{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Cover Letter Generator{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Flatpickr Date Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <!-- Alert System CSS -->
    <link rel="stylesheet" href="{% static 'utils/css/alerts.css' %}">
    
    <!-- Base CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    
    <!-- Custom CSS -->
    {% block extra_css %}{% endblock %}
    
    {% block extra_head %}{% endblock %}
    
    <!-- Base CSS -->
    <style>
        .prose {
            max-width: 65ch;
            color: #374151;
        }
        .prose p {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
        }
        
        /* Password toggle button styles */
        .password-toggle-btn {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            padding-right: 0.75rem;
            display: flex;
            align-items: center;
            color: #9CA3AF;
            transition: color 0.2s ease-in-out;
            z-index: 20;
            pointer-events: auto;
        }
        
        .password-toggle-btn:hover {
            color: #4B5563;
        }
        
        .password-toggle-btn:focus {
            outline: none;
            color: #4B5563;
        }
        
        /* Ensure password fields have proper padding for the toggle button */
        input[type="password"], input[type="text"] {
            padding-right: 2.5rem !important;
        }
    </style>
    
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    {% include 'navigation.html' %}
    
    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    {% include 'home/partials/footer.html' %}

    <!-- Base JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Alert System JavaScript -->
    <script src="{% static 'utils/components/dialog.js' %}"></script>
    <script src="{% static 'utils/components/alert.js' %}"></script>

    <!-- Subscription Frontend Utilities -->
    <script>
        // Set user subscription plan from backend context
        window.userSubscriptionPlan = '{{ current_subscription.plan.name|default:"Free" }}';
        console.log('User subscription plan set to:', window.userSubscriptionPlan);
    </script>
    
    <!-- Subscription Dialog System -->
    <script src="{% static 'subscriptions/js/subscription_dialog.js' %}"></script>

    <!-- Extra JavaScript -->
    {% block extra_scripts %}{% endblock %}

    <!-- i18next CDN -->
    <script src="https://unpkg.com/i18next@23.4.6/dist/umd/i18next.min.js"></script>
    
    <!-- i18next Initialization -->
    <script>
    // Initialize i18next with all languages
    async function initializeI18next() {
        try {
            // Load all language resources from job_service app
            const [enRes, frRes, esRes] = await Promise.all([
                fetch('{% static "job_service/lang/en.json" %}').then(res => res.json()),
                fetch('{% static "job_service/lang/fr.json" %}').then(res => res.json()),
                fetch('{% static "job_service/lang/es.json" %}').then(res => res.json())
            ]);

            // Initialize i18next with all resources
            await i18next.init({
                lng: 'en', // default language
                fallbackLng: 'en',
                resources: {
                    en: { translation: enRes },
                    fr: { translation: frRes },
                    es: { translation: esRes }
                },
                debug: false
            });

            // Update all elements with data-i18n attributes
            updateContent();
            
            console.log('i18next initialized successfully');
        } catch (error) {
            console.error('Error initializing i18next:', error);
        }
    }

    function updateContent() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            const translation = i18next.t(key, el.dataset);
            if (translation && translation !== key) {
                el.textContent = translation;
            }
        });
        // Update placeholders
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (key) {
                el.placeholder = i18next.t(key);
            }
        });
    }

    // Initialize i18next when DOM is loaded
    document.addEventListener('DOMContentLoaded', async function() {
        await initializeI18next();
        updateContent();
        i18next.on('languageChanged', updateContent);
    });
    </script>
</body>
</html>
