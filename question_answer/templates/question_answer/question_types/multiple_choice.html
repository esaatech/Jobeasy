<div class="mb-4">
  <div class="font-medium mb-2">{{ question.text }}</div>
  <div class="space-y-2">
    {% for option in question.options %}
      <label class="flex items-center space-x-2">
        <input type="radio" name="question_{{ question.id }}" value="{{ option }}" class="form-radio text-blue-600"{% if forloop.first %} data-correct="{{ question.correct_answer }}"{% endif %}>
        <span>{{ option }}</span>
      </label>
    {% endfor %}
  </div>
</div>
