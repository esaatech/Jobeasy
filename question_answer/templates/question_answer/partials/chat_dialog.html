<!-- Interview Coach Chat Dialog -->
<div id="chatDialog" class="chat-dialog-overlay" style="display: none;">
    <div class="chat-dialog-container">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="chat-header-content">
                <h3 class="chat-title">🤖 Interview Coach</h3>
                <p class="chat-subtitle" id="chatQuestionContext">Ready to help you with your interview question</p>
            </div>
            <button class="chat-close-btn" onclick="closeChatDialog()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be dynamically added here -->
        </div>

        <!-- Quick Action Buttons -->
        <div class="chat-quick-actions" id="chatQuickActions">
            <button class="quick-action-btn" onclick="sendQuickMessage('Give me a structure for this answer')">
                📋 Answer Structure
            </button>
            <button class="quick-action-btn" onclick="sendQuickMessage('Provide specific examples')">
                💡 Examples
            </button>
            <button class="quick-action-btn" onclick="sendQuickMessage('What should I avoid saying?')">
                ⚠️ What to Avoid
            </button>
            <button class="quick-action-btn" onclick="sendQuickMessage('Give me a practice response')">
                🎯 Practice Response
            </button>
        </div>

        <!-- Chat Input Area -->
        <div class="chat-input-area">
            <div class="chat-input-container">
                <textarea 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="Ask your interview coach for guidance..."
                    rows="1"
                ></textarea>
                <button class="chat-send-btn" onclick="sendChatMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22,2 15,22 11,13 2,9"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
