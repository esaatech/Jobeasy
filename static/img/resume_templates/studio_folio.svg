<svg xmlns="http://www.w3.org/2000/svg" width="340" height="440" viewBox="0 0 340 440" role="img" aria-label="Studio Folio resume preview">
  <defs>
    <filter id="sf-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity=".14"/>
    </filter>
    <linearGradient id="sf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e7e5e4;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#fff7ed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fafaf9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sf-avatar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <clipPath id="sf-mask" clipPathUnits="userSpaceOnUse">
      <polygon points="68.4,59.2 111.5,63.7 113.8,108.5 92.5,118.7 65.6,109.8 63.4,82.9"/>
    </clipPath>
  </defs>
  <rect width="340" height="440" fill="url(#sf-bg)"/>
  <rect x="20" y="16" width="300" height="408" rx="8" fill="#ffffff" stroke="#e7e5e4" filter="url(#sf-shadow)"/>
  <g transform="translate(82, 28)">
    <g clip-path="url(#sf-mask)">
      <rect x="58" y="54" width="62" height="72" fill="url(#sf-avatar)"/>
      <text x="88" y="99" text-anchor="middle" fill="#ffffff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="800">SF</text>
    </g>
  </g>
  <text x="170" y="118" text-anchor="middle" fill="#1c1917" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="800">Sam Folio</text>
