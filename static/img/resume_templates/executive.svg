<svg xmlns="http://www.w3.org/2000/svg" width="340" height="440" viewBox="0 0 340 440" role="img" aria-label="Executive resume preview">
  <defs>
    <filter id="e-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="340" height="440" fill="#fafafa"/>
  <!-- Document card -->
  <g filter="url(#e-shadow)">
    <rect x="28" y="16" width="284" height="408" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  </g>
  <!-- Executive header band (matches dark band + name treatment) -->
  <rect x="28" y="16" width="284" height="92" rx="4" fill="#0f172a"/>
  <rect x="28" y="92" width="284" height="16" fill="#ffffff"/>
  <text x="170" y="52" text-anchor="middle" fill="#ffffff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700">Sarah Johnson</text>
  <text x="170" y="73" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Senior Director</text>
  <text x="170" y="91" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8">email • phone</text>
  <!-- Accent line -->
  <rect x="44" y="112" width="48" height="3" rx="1" fill="#f59e0b"/>
  <text x="44" y="132" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7" font-weight="700" letter-spacing="0.06em">EXECUTIVE SUMMARY</text>
  <rect x="44" y="140" width="252" height="4" fill="#e2e8f0" rx="1"/>
  <rect x="44" y="148" width="228" height="4" fill="#e2e8f0" rx="1"/>
  <rect x="44" y="156" width="236" height="4" fill="#e2e8f0" rx="1"/>
  <!-- Experience block -->
  <text x="44" y="186" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7" font-weight="700" letter-spacing="0.06em">PROFESSIONAL EXPERIENCE</text>
  <rect x="44" y="194" width="252" height="1" fill="#cbd5e1"/>
  <text x="44" y="206" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700">VP Engineering</text>
  <text x="44" y="218" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7">Acme Corp</text>
  <text x="252" y="206" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7">2019 — Present</text>
  <rect x="44" y="226" width="240" height="3" fill="#f1f5f9" rx="1"/>
  <rect x="44" y="232" width="220" height="3" fill="#f1f5f9" rx="1"/>
  <text x="44" y="252" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700">Director of Product</text>
  <text x="44" y="264" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7">Northwind</text>
  <rect x="44" y="270" width="230" height="3" fill="#f1f5f9" rx="1"/>
  <!-- Skills row -->
  <text x="44" y="298" fill="#475569" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7" font-weight="700" letter-spacing="0.06em">CORE CAPABILITIES</text>
  <rect x="44" y="304" width="252" height="1" fill="#cbd5e1"/>
  <rect x="44" y="312" width="54" height="14" rx="2" fill="#f1f5f9"/>
  <rect x="104" y="312" width="62" height="14" rx="2" fill="#f1f5f9"/>
  <rect x="172" y="312" width="48" height="14" rx="2" fill="#f1f5f9"/>
  <rect x="226" y="312" width="58" height="14" rx="2" fill="#f1f5f9"/>
  <rect x="44" y="330" width="72" height="14" rx="2" fill="#f1f5f9"/>
  <rect x="122" y="330" width="52" height="14" rx="2" fill="#f1f5f9"/>
</svg>
