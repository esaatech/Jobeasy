<svg xmlns="http://www.w3.org/2000/svg" width="340" height="440" viewBox="0 0 340 440" role="img" aria-label="Modern resume preview">
  <defs>
    <filter id="mod-sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="340" height="440" fill="#fafafa"/>
  <g filter="url(#mod-sh)">
    <rect x="28" y="16" width="284" height="408" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  </g>
  <!-- Left sidebar (matches modern.html bg-gray-50 rounded-lg) -->
  <rect x="36" y="28" width="78" height="384" rx="3" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="75" y="48" text-anchor="middle" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8" font-weight="700">Sarah Johnson</text>
  <text x="75" y="60" text-anchor="middle" fill="#4b5563" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7">Engineer</text>
  <text x="44" y="82" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7" font-weight="600">Contact</text>
  <rect x="44" y="86" width="62" height="1" fill="#e5e7eb"/>
  <rect x="44" y="92" width="58" height="2" fill="#e5e7eb" rx="1"/>
  <rect x="44" y="98" width="54" height="2" fill="#e5e7eb" rx="1"/>
  <text x="44" y="118" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="7" font-weight="600">Skills</text>
  <rect x="44" y="122" width="62" height="1" fill="#e5e7eb"/>
  <text x="44" y="134" fill="#374151" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6" font-weight="500">Technical</text>
  <rect x="44" y="138" width="28" height="8" rx="2" fill="#dbeafe"/>
  <rect x="74" y="138" width="26" height="8" rx="2" fill="#dbeafe"/>
  <text x="44" y="156" fill="#374151" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6" font-weight="500">Soft Skills</text>
  <rect x="44" y="160" width="30" height="8" rx="2" fill="#e9d5ff"/>
  <rect x="76" y="160" width="26" height="8" rx="2" fill="#e9d5ff"/>
  <!-- Main column: About Me + Experience with blue timeline -->
  <text x="128" y="40" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700">About Me</text>
  <rect x="128" y="46" width="168" height="3" fill="#e5e7eb" rx="1"/>
  <rect x="128" y="54" width="156" height="3" fill="#e5e7eb" rx="1"/>
  <text x="128" y="84" fill="#111827" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700">Experience</text>
  <rect x="136" y="96" width="2" height="72" fill="#bfdbfe"/>
  <circle cx="137" cy="104" r="3" fill="#60a5fa"/>
  <rect x="146" y="96" width="140" height="5" fill="#111827" rx="1"/>
  <rect x="146" y="104" width="100" height="4" fill="#2563eb" rx="1"/>
  <text x="234" y="100" fill="#6b7280" font-family="ui-sans-serif,system-ui,sans-serif" font-size="6">2022 - Now</text>
  <rect x="146" y="112" width="148" height="2" fill="#f3f4f6" rx="1"/>
  <rect x="146" y="118" width="120" height="2" fill="#f3f4f6" rx="1"/>
  <circle cx="137" cy="136" r="3" fill="#60a5fa"/>
  <rect x="146" y="128" width="120" height="5" fill="#111827" rx="1"/>
  <rect x="146" y="136" width="132" height="2" fill="#f3f4f6" rx="1"/>
</svg>
