<div id="templatePreviewModal" class="fixed inset-0 bg-black bg-opacity-50 z-[9999] hidden" role="dialog" aria-modal="true" aria-labelledby="templatePreviewTitle">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col">
            <div class="flex items-center justify-between p-6 border-b border-gray-200 shrink-0">
                <h3 id="templatePreviewTitle" class="text-xl font-bold text-gray-800">{{ preview_modal_title|default:"Template preview" }}</h3>
                <button type="button" onclick="closeTemplatePreview()" class="text-gray-400 hover:text-gray-600 rounded-lg p-1" aria-label="Close">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            {% if preview_templates %}
            <div class="flex flex-wrap justify-center gap-2 p-4 bg-gray-50 border-b border-gray-200 shrink-0">
                {% for t in preview_templates %}
                <button type="button" onclick="switchPreviewTemplate('{{ t.id }}')"
                        class="preview-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                        data-template="{{ t.id }}">
                    {{ t.name }}
                </button>
                {% endfor %}
            </div>
            {% endif %}
            <div class="p-6 overflow-y-auto flex-1 min-h-0">
                <div class="mb-6 rounded-lg border border-blue-100 bg-blue-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-blue-700 mb-1">Role label</p>
                    <h4 id="previewRoleLabel" class="text-xl font-semibold text-gray-900"></h4>
                    <p class="text-xs font-semibold uppercase tracking-wide text-blue-700 mt-4 mb-1">Description</p>
                    <p id="previewTemplateDescription" class="text-sm text-gray-700 leading-relaxed"></p>
                </div>
                <div id="previewContent" class="resume-preview prose max-w-none"></div>
            </div>
            <div class="flex justify-end gap-3 p-6 border-t border-gray-200 shrink-0">
                <button type="button" onclick="closeTemplatePreview()"
                        class="px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">
                    Close
                </button>
                <button type="button"
                        onclick="useTemplateFromModal()"
                        data-preview-action="{{ preview_action|default:'redirect' }}"
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    {{ preview_use_label|default:"Use this resume" }}
                </button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const modalElement = document.getElementById('templatePreviewModal');
    if (!modalElement || window.templatePreviewModalInitialized) {
        return;
    }
    window.templatePreviewModalInitialized = true;

    let currentPreviewTemplate = '{{ default_template_id }}';
    const previewAction = '{{ preview_action|default:"redirect"|escapejs }}';
    const previewTemplateMeta = {
        {% for t in preview_templates %}
        '{{ t.id }}': {
            roleLabel: `{{ t.role_label|default:t.name|escapejs }}`,
            description: `{{ t.description|default:""|escapejs }}`
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    };

    function updatePreviewMeta(templateId) {
        const roleLabelNode = document.getElementById('previewRoleLabel');
        const descriptionNode = document.getElementById('previewTemplateDescription');
        const templateMeta = previewTemplateMeta[templateId] || {};

        if (roleLabelNode) {
            roleLabelNode.textContent = templateMeta.roleLabel || 'Template';
        }
        if (descriptionNode) {
            descriptionNode.textContent = templateMeta.description || 'No description available for this template.';
        }
    }

    function updatePreviewTabs(activeTemplate) {
        document.querySelectorAll('.preview-tab').forEach(tab => {
            const template = tab.dataset.template;
            if (template === activeTemplate) {
                tab.classList.add('bg-blue-100', 'text-blue-700');
                tab.classList.remove('bg-white', 'text-gray-600', 'hover:bg-gray-100');
            } else {
                tab.classList.remove('bg-blue-100', 'text-blue-700');
                tab.classList.add('bg-white', 'text-gray-600', 'hover:bg-gray-100');
            }
        });
    }

    function loadTemplatePreview(templateId) {
        const previewContent = document.getElementById('previewContent');
        const userLocale = navigator.language || 'en-US';
        fetch(`/resume/preview/${encodeURIComponent(templateId)}/?locale=${userLocale}`)
            .then(response => {
                if (!response.ok) throw new Error('Failed to load template');
                return response.text();
            })
            .then(html => { previewContent.innerHTML = html; })
            .catch(() => {
                previewContent.innerHTML = '<p class="text-sm text-gray-500 text-center py-8">Unable to load template preview.</p>';
            });
    }

    window.showTemplatePreview = function(templateId) {
        currentPreviewTemplate = templateId;
        modalElement.classList.remove('hidden');
        updatePreviewMeta(templateId);
        loadTemplatePreview(templateId);
        updatePreviewTabs(templateId);
    };

    window.closeTemplatePreview = function() {
        modalElement.classList.add('hidden');
    };

    window.switchPreviewTemplate = function(templateId) {
        currentPreviewTemplate = templateId;
        updatePreviewMeta(templateId);
        loadTemplatePreview(templateId);
        updatePreviewTabs(templateId);
    };

    window.useTemplate = function(templateId) {
        window.location.href = `/resume/create-resume/?template=${encodeURIComponent(templateId)}`;
    };

    window.useTemplateFromModal = function() {
        if (previewAction === 'select-radio') {
            const radio = document.querySelector(`input[name="template_id"][value="${currentPreviewTemplate}"]`);
            if (radio) {
                radio.checked = true;
            }
            window.closeTemplatePreview();
            return;
        }
        window.useTemplate(currentPreviewTemplate);
    };

    modalElement.addEventListener('click', function(e) {
        if (e.target === this) window.closeTemplatePreview();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') window.closeTemplatePreview();
    });

    updatePreviewMeta(currentPreviewTemplate);
})();
</script>
