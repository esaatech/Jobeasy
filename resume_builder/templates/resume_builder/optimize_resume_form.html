{% load static %}

<form method="POST" enctype="multipart/form-data" class="space-y-8 font-sans" id="uploadResumeForm">
    {% csrf_token %}
    
    <!-- Template Selection Section -->
   {% include 'partials/template_selection.html' %}

    <!-- Resume Upload Section -->
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <h2 class="headline-secondary mb-6">Upload Your Resume</h2>
        <div class="border-b-2 border-emerald-500 mb-6"></div>
        <div class="space-y-4">
            <!-- Drag & Drop Zone -->
            <div class="drag-drop-zone">
                <div id="drop-zone" 
                     class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-emerald-500 transition-colors duration-200 cursor-pointer">
                    <input type="file" 
                           name="resume_file" 
                           id="resume-file" 
                           accept=".pdf,.doc,.docx" 
                           class="hidden">
                    <div class="space-y-4">
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                            <path d="M28 8H12a4 4 0 00-4 4v20m0 0v4a4 4 0 004 4h20a4 4 0 004-4V28m-4-4h4a4 4 0 004-4V12a4 4 0 00-4-4h-4m-12 8v-4m0 4v4m0-4h12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <div class="flex flex-col items-center text-sm text-gray-600">
                            <label for="resume-file" class="font-medium text-emerald-600 hover:text-emerald-500 cursor-pointer">
                                Click to upload
                            </label>
                            <span class="mt-1">or drag and drop</span>
                        </div>
                        <p class="text-xs text-gray-500">
                            PDF, DOC, or DOCX (up to 10MB)
                        </p>
                    </div>
                    <div id="file-info" class="hidden mt-4 text-sm text-gray-600">
                        <span class="file-name font-medium"></span>
                        <button type="button" id="remove-file" class="ml-2 text-red-500 hover:text-red-700">
                            Remove
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Submit Button -->
    <div class="flex justify-center">
        <button type="submit" 
                class="btn btn-success btn-lg">
            Upload Resume
        </button>
    </div>
</form>

<script>
// Network Error Handling Utilities
const NETWORK_ERROR_MESSAGES = {
    network_timeout: {
        title: "Request Timed Out",
        message: "The request took too long to complete. Please try again. If the problem persists, contact support.",
        level: "warning"
    },
    network_connection: {
        title: "Connection Error", 
        message: "Unable to connect to the server. Please check your internet connection and try again.",
        level: "error"
    },
    network_generic: {
        title: "Network Error",
        message: "An unexpected network error occurred. Please try again later.", 
        level: "error"
    }
};

function showNetworkErrorDialog(errorType = "network_generic", customMessage = null) {
    const error = NETWORK_ERROR_MESSAGES[errorType] || NETWORK_ERROR_MESSAGES.network_generic;
    const message = customMessage || error.message;
    
    // Create error dialog element
    const dialog = document.createElement("div");
    dialog.className = `fixed top-8 left-1/2 transform -translate-x-1/2 z-50 bg-white border border-gray-300 shadow-lg rounded-lg p-6 max-w-sm w-full text-center ${
        error.level === "warning" ? "border-yellow-400" : "border-red-400"
    }`;
    
    dialog.innerHTML = `
        <div class="flex items-center justify-center mb-4">
            <div class="w-12 h-12 rounded-full flex items-center justify-center ${
                error.level === "warning" ? "bg-yellow-100 text-yellow-600" : "bg-red-100 text-red-600"
            }">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                </svg>
            </div>
        </div>
        <h3 class="text-lg font-bold mb-2 text-gray-900">${error.title}</h3>
        <p class="text-gray-700 mb-4">${message}</p>
        <button onclick="this.parentElement.remove()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
            Close
        </button>
    `;
    
    // Add to page
    document.body.appendChild(dialog);
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
        if (dialog.parentElement) {
            dialog.remove();
        }
    }, 5000);
}

function handleNetworkError(response, errorType = "network_generic") {
    if (!response.ok) {
        if (response.status === 408 || response.status === 504) {
            showNetworkErrorDialog("network_timeout");
        } else if (response.status === 0 || response.status >= 500) {
            showNetworkErrorDialog("network_connection");
        } else {
            showNetworkErrorDialog(errorType);
        }
        return true; // Error was handled
    }
    return false; // No error
}

document.getElementById('uploadResumeForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const submitButton = this.querySelector('button[type="submit"]');
    
    try {
        submitButton.disabled = true;
        submitButton.innerHTML = `
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Uploading...
        `;

        const response = await fetch('{% url "resume_builder:upload_resume" %}', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        // Handle network errors first
        if (handleNetworkError(response)) {
            return;
        }

        // Handle structured error responses from backend
        if (!response.ok) {
            if (data.error && data.error.title && data.error.message) {
                // Backend returned a structured error dialog
                showNetworkErrorDialog(data.error.error_type || "network_generic", data.error.message, data.error.title);
            } else {
                // Fallback to generic error
                showNetworkErrorDialog("network_generic", data.error || 'Upload failed');
            }
            return;
        }

        if (data.success) {
            window.location.href = data.redirect_url;
        } else {
            showNetworkErrorDialog("network_generic", data.error || 'Unknown error occurred');
        }

    } catch (error) {
        console.error('Error:', error);
        showNetworkErrorDialog("network_connection", error.message || 'Failed to upload resume. Please try again.');
    } finally {
        submitButton.disabled = false;
        submitButton.innerHTML = 'Upload Resume';
    }
});

// Drag and drop functionality
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('resume-file');
const fileInfo = document.getElementById('file-info');
const fileName = fileInfo.querySelector('.file-name');
const removeButton = document.getElementById('remove-file');

// Prevent default drag behaviors
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
    document.body.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults (e) {
    e.preventDefault();
    e.stopPropagation();
}

// Highlight drop zone when dragging over it
['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, highlight, false);
});

['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, unhighlight, false);
});

function highlight(e) {
    dropZone.classList.add('border-emerald-500', 'bg-emerald-50');
}

function unhighlight(e) {
    dropZone.classList.remove('border-emerald-500', 'bg-emerald-50');
}

// Handle dropped files
dropZone.addEventListener('drop', handleDrop, false);

function handleDrop(e) {
    const dt = e.dataTransfer;
    const files = dt.files;
    handleFiles(files);
}

function handleFiles(files) {
    if (files.length > 0) {
        const file = files[0];
        const allowedTypes = ['.pdf', '.doc', '.docx'];
        const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
        
        if (!allowedTypes.includes(fileExtension)) {
            showNetworkErrorDialog("network_generic", 'Please upload a PDF, DOC, or DOCX file');
            return;
        }

        // Set the file in the file input
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        fileInput.files = dataTransfer.files;

        // Show file info
        fileName.textContent = file.name;
        fileInfo.classList.remove('hidden');
        dropZone.classList.add('border-green-500', 'bg-green-50');

        // Log for debugging
        console.log('File added:', file.name);
    }
}

// Remove file
removeButton.addEventListener('click', function() {
    fileInput.value = '';
    fileInfo.classList.add('hidden');
    dropZone.classList.remove('border-green-500', 'bg-green-50');
});

// Click anywhere in drop zone to trigger file input
dropZone.addEventListener('click', function(e) {
    if (e.target !== removeButton && !removeButton.contains(e.target)) {
        fileInput.click();
    }
});
</script>
