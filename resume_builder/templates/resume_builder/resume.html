{% extends 'base.html' %}

{% block content %}
<!-- Hero Section -->
<section class="bg-gradient-to-r from-blue-50 to-white">
    <div class="max-w-7xl mx-auto px-4 py-12 sm:py-16">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">{{ hero_content.title }}</h1>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-8">
                {{ hero_content.description }}
            </p>
            <div class="flex justify-center gap-4">
                <button onclick="switchTab('create')" 
                        class="tab-button bg-[#1980e6] text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors"
                        id="createTab">
                    {{ hero_content.buttons.create }}
                </button>
                <button onclick="switchTab('optimize')" 
                        class="tab-button border border-[#1980e6] text-[#1980e6] px-6 py-3 rounded-lg hover:bg-blue-50 transition-colors"
                        id="optimizeTab">
                    {{ hero_content.buttons.optimize }}
                </button>
            </div>
           
        </div>
    </div>
</section>

<!-- Tab Content Section -->
<section class="bg-gray-50 py-12">
    <div class="max-w-4xl mx-auto px-4">
        <!-- Create Resume Form -->
        <div id="createContent" class="tab-content">
            {% include 'resume_builder/create_resume_form.html' %}
        </div>

        <!-- Optimize Resume Form -->
        <div id="optimizeContent" class="tab-content hidden">
            {% include 'resume_builder/optimize_resume_form.html' %}
        </div>
    </div>
</section>

<!-- Template Preview Modal -->
<div id="templatePreviewModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden">
            <!-- Modal Header -->
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-800">Template Preview</h3>
                <button onclick="closeTemplatePreview()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Template Navigation -->
            <div class="flex justify-center space-x-4 p-4 bg-gray-50 border-b border-gray-200">
                <button onclick="switchPreviewTemplate('professional')" 
                        class="preview-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                        data-template="professional">
                    Professional
                </button>
                <button onclick="switchPreviewTemplate('modern')" 
                        class="preview-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                        data-template="modern">
                    Modern
                </button>
                <button onclick="switchPreviewTemplate('creative')" 
                        class="preview-tab px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                        data-template="creative">
                    Creative
                </button>
            </div>
            
            <!-- Preview Content -->
            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <div id="previewContent" class="resume-preview">
                    <!-- Template content will be loaded here -->
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="flex justify-end space-x-3 p-6 border-t border-gray-200">
                <button onclick="closeTemplatePreview()" 
                        class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">
                    Close
                </button>
                <button onclick="selectCurrentTemplate()" 
                        class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-medium">
                    Select This Template
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function switchTab(tabName) {
    // Hide all tab contents
    document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.add('hidden');
    });
    
    // Reset all tab buttons
    document.querySelectorAll('.tab-button').forEach(button => {
        button.classList.remove('bg-[#1980e6]', 'text-white');
        button.classList.add('border', 'border-[#1980e6]', 'text-[#1980e6]');
    });
    
    // Show selected tab content
    const selectedContent = document.getElementById(tabName + 'Content');
    selectedContent.classList.remove('hidden');
    
    // Update selected tab button
    const selectedTab = document.getElementById(tabName + 'Tab');
    selectedTab.classList.remove('border', 'border-[#1980e6]', 'text-[#1980e6]');
    selectedTab.classList.add('bg-[#1980e6]', 'text-white');
}

// Template Preview Modal Logic
let currentPreviewTemplate = 'professional';

function showTemplatePreview(templateId) {
    currentPreviewTemplate = templateId;
    document.getElementById('templatePreviewModal').classList.remove('hidden');
    loadTemplatePreview(templateId);
    updatePreviewTabs(templateId);
}

function closeTemplatePreview() {
    document.getElementById('templatePreviewModal').classList.add('hidden');
}

function switchPreviewTemplate(templateId) {
    currentPreviewTemplate = templateId;
    loadTemplatePreview(templateId);
    updatePreviewTabs(templateId);
}

function updatePreviewTabs(activeTemplate) {
    document.querySelectorAll('.preview-tab').forEach(tab => {
        const template = tab.dataset.template;
        if (template === activeTemplate) {
            tab.classList.add('bg-emerald-100', 'text-emerald-700');
            tab.classList.remove('bg-white', 'text-gray-600', 'hover:bg-gray-100');
        } else {
            tab.classList.remove('bg-emerald-100', 'text-emerald-700');
            tab.classList.add('bg-white', 'text-gray-600', 'hover:bg-gray-100');
        }
    });
}

function selectCurrentTemplate() {
    // Set the radio button for the current template
    document.querySelector(`input[name="template_id"][value="${currentPreviewTemplate}"]`).checked = true;
    closeTemplatePreview();
}

function loadTemplatePreview(templateId) {
    const previewContent = document.getElementById('previewContent');
    
    // Get user's locale (could be from user preferences, browser settings, etc.)
    const userLocale = navigator.language || 'en-US';
    
    // Load template content from backend with locale support
    fetch(`{% url 'resume_builder:preview_template' 'professional' %}`.replace('professional', templateId) + `?locale=${userLocale}`)
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to load template');
            }
            return response.text();
        })
        .then(html => {
            previewContent.innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading template:', error);
            // Show a simple error message instead of duplicate sample data
            previewContent.innerHTML = `
                <div class="text-center py-8">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <h3 class="mt-2 text-sm font-medium text-gray-900">Template Preview Unavailable</h3>
                    <p class="mt-1 text-sm text-gray-500">Unable to load template preview. Please try again later.</p>
                </div>
            `;
        });
}

// Close modal when clicking outside
document.getElementById('templatePreviewModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeTemplatePreview();
    }
});

// Close modal with Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeTemplatePreview();
    }
});

// Your existing JavaScript code for form handling...
</script>
{% endblock %}
