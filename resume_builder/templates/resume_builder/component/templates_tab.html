<div class="p-6 space-y-4">
    <h3 class="text-lg font-semibold text-gray-900">Resume templates</h3>
    <p class="text-sm text-gray-600">These styles are available when you build or switch templates.</p>
    <ul class="divide-y divide-gray-200 rounded-lg border border-gray-200 bg-white">
        {% for t in templates %}
        <li class="px-4 py-3">
            <div class="font-medium text-gray-900">{{ t.name }}</div>
            <p class="text-sm text-gray-600 mt-1">{{ t.description }}</p>
        </li>
        {% endfor %}
    </ul>
</div>
