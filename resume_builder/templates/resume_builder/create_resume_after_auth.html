{% extends 'base.html' %}
{% load static %}

{% block title %}Creating Your Resume - Jobeas{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8 text-center">
        <div class="mb-6">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Creating Your Resume</h2>
            <p class="text-gray-600">Please wait while we save your resume...</p>
        </div>
        
        <div class="flex justify-center mb-6">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>
        
        <div id="error-message" class="hidden text-red-600 text-sm mb-4"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const pendingResumeData = sessionStorage.getItem('pendingResumeData');
    
    if (pendingResumeData) {
        try {
            const resumeData = JSON.parse(pendingResumeData);
            console.log('Found pending resume data, creating resume...');
            
            // Create the resume via API
            fetch('{% url "resume_builder:create_resume_from_data" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(resumeData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('Resume created successfully:', data);
                    // Remove the pending data from sessionStorage
                    sessionStorage.removeItem('pendingResumeData');
                    sessionStorage.removeItem('fromResumeCreation');
                    // Redirect to my resumes page
                    window.location.href = data.redirect_url;
                } else {
                    console.error('Failed to create resume:', data.error);
                    // Remove the pending data to avoid infinite retries
                    sessionStorage.removeItem('pendingResumeData');
                    sessionStorage.removeItem('fromResumeCreation');
                    showError('Failed to save your resume: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error creating resume:', error);
                // Remove the pending data to avoid infinite retries
                sessionStorage.removeItem('pendingResumeData');
                sessionStorage.removeItem('fromResumeCreation');
                showError('Failed to save your resume. Please try again.');
            });
        } catch (error) {
            console.error('Error parsing pending resume data:', error);
            // Remove the invalid data
            sessionStorage.removeItem('pendingResumeData');
            sessionStorage.removeItem('fromResumeCreation');
            showError('Invalid resume data. Please create a new resume.');
        }
    } else {
        // No pending resume data, clear any leftover flags and redirect to dashboard
        sessionStorage.removeItem('fromResumeCreation');
        window.location.href = '{% url "dashboard:dashboard" %}';
    }
    
    function showError(message) {
        const errorElement = document.getElementById('error-message');
        errorElement.textContent = message;
        errorElement.classList.remove('hidden');
        
        // Redirect to dashboard after showing error
        setTimeout(() => {
            window.location.href = '{% url "dashboard:dashboard" %}';
        }, 3000);
    }
});
</script>
{% endblock %}
