<!-- Step 5: Additional Information -->
<div class="form-step hidden" data-step="5">
    <h2 class="headline-secondary mb-6">Additional Information</h2>
    <div class="border-b-2 border-emerald-500 mb-6"></div>
    <div class="space-y-6">
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Certifications</label>
            <textarea name="certifications" id="certifications-editor" rows="3" class="w-full p-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-10">{% if resume_instance.additional.certifications %}{{ resume_instance.additional.certifications }}{% endif %}</textarea>
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Projects</label>
            <textarea name="projects" id="projects-editor" rows="3" class="w-full p-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-10">{% if resume_instance.additional.projects %}{{ resume_instance.additional.projects }}{% endif %}</textarea>
        </div>
    </div>
</div>
