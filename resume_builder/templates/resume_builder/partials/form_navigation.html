<!-- Navigation Buttons -->
<div class="flex flex-wrap justify-center sm:justify-between items-center mt-8 gap-4">
    <button type="button" id="prevBtn" onclick="prevStep()"
        class="btn btn-gray hidden">
        Previous
    </button>
    <div class="flex items-center flex-wrap gap-4 ml-auto justify-center sm:justify-end">
        <button type="button" id="saveStepBtn" onclick="saveAndExit()"
            class="btn btn-violet hidden">
            Save and Exit
        </button>
        <button type="button" id="nextBtn" onclick="nextStep()"
            class="btn btn-success">
            Next
        </button>
        <div id="finalButtons" class="hidden flex items-center flex-wrap justify-center sm:justify-end gap-4">
            <button type="button" id="saveBtn" onclick="finalizeResume('save')"
                class="btn btn-violet">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
                </svg>
                Save Resume
            </button>
            <button type="button" id="previewBtn" onclick="finalizeResume('preview')"
                class="btn btn-success">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                Preview/Download 
            </button>
        </div>
    </div>
</div>
