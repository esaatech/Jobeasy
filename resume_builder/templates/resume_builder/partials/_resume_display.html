{% comment %}
This partial displays the rendered resume HTML and provides download controls.
It requires 'resume' and 'resume_html' in the context.
{% endcomment %}

<div class="bg-gray-100 p-4 sm:p-8 rounded-lg">
    <!-- Action Buttons -->
    <div class="flex flex-wrap justify-center sm:justify-end items-center gap-3 mb-6">
        <a href="{% url 'resume_builder:edit_resume' resume.id %}" 
           class="bg-blue-600 text-white px-5 py-2 rounded-md hover:bg-blue-700 text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            Edit
        </a>
        <a href="{% url 'resume_builder:download_resume_file' resume.id 'pdf' %}"
           class="bg-red-600 text-white px-5 py-2 rounded-md hover:bg-red-700 text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Download PDF
        </a>
        <a href="{% url 'resume_builder:download_resume_file' resume.id 'word' %}"
           class="bg-sky-600 text-white px-5 py-2 rounded-md hover:bg-sky-700 text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Download Word
        </a>
        <a href="{% url 'resume_builder:my_resumes' %}"
           class="bg-gray-600 text-white px-5 py-2 rounded-md hover:bg-gray-700 text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to My Resumes
        </a>
    </div>

    <!-- Resume Display -->
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        {{ resume_html|safe }}
    </div>
</div>
