<!-- Experience Template (Hidden) -->
<template id="experienceTemplate">
    <div class="experience-entry border border-gray-200 rounded-lg p-4 relative bg-gray-50">
        <button type="button" onclick="removeEntry(this)" class="absolute top-2 right-2 text-red-600 hover:text-red-800">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Company Name</label>
                <input type="text" name="experience[].company" required
                    class="w-full p-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-10">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Position</label>
                <input type="text" name="experience[].position" required
                    class="w-full p-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-10">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Start Date</label>
                {% include 'partials/date_field.html' with name_prefix='experience[].startDate' months=date_options.months years=date_options.years present_label=date_options.present_label current_month=date_options.current_month current_year=date_options.current_year date_value='' is_end_date=False %}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">End Date</label>
                {% include 'partials/date_field.html' with name_prefix='experience[].endDate' months=date_options.months years=date_options.years present_label=date_options.present_label current_month=date_options.current_month current_year=date_options.current_year date_value='' is_end_date=True %}
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
                <textarea name="experience[].description" id="exp-desc-template" rows="3" required class="w-full p-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-10"></textarea>
            </div>
        </div>
    </div>
</template>
