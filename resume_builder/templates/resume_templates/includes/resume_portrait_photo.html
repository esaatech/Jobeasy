{% load resume_filters %}
<div class="{{ portrait_wrapper_class|default:'flex justify-center mb-6' }}">
    {% if resume_data.personal_info.profile_photo_display_url %}
    <img src="{{ resume_data.personal_info.profile_photo_display_url }}"
         alt=""
         width="168"
         height="168"
         class="resume-portrait-photo rounded-sm shadow-lg border-4 border-white"
         referrerpolicy="no-referrer"/>
    {% else %}
    <div class="resume-portrait-photo bg-gradient-to-br from-violet-300 via-fuchsia-200 to-amber-200 opacity-85 border-4 border-white shadow-lg flex items-center justify-center text-white text-5xl font-bold">
        {{ resume_data.personal_info.full_name|default:"?"|slice:":1"|upper }}
    </div>
    {% endif %}
</div>
