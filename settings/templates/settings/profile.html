{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white shadow rounded-lg p-8">
    <h2 class="headline-primary mb-6">Profile</h2>
    <div class="flex items-center space-x-6 mb-8">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-3xl text-blue-600 font-bold">
            {{ user.username|slice:':1'|upper }}
        </div>
        <div>
            <div class="text-lg font-semibold text-gray-900">{{ user.get_full_name|default:user.username }}</div>
            <div class="text-gray-600">{{ user.email }}</div>
        </div>
    </div>
    
    <div class="flex justify-end">
        <a href="#" class="text-blue-600 hover:underline">Edit Profile</a>
    </div>
</div>
{% endblock %}
